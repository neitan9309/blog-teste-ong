<!DOCTYPE html>

<head>

<body>

            <a href="index.html" class="logo" style="text-decoration:none;">BlogSocial</a>
            <button class="mobile-menu-btn">☰</button>
            <ul class="nav-links">
                <li><a href="index.html">Início</a></li>
                <li><a href="artigos.html" class="active">Artigos</a></li>
                <li><a href="voluntario.html">Seja Voluntário</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="artigos-page">
            <div class="container">
                <!-- Cabeçalho com busca e filtros -->
                <div class="artigos-header">
                    <h1>Todos os Artigos</h1>
                    <div class="filtros">
                        <input type="text" id="buscaArtigos" placeholder="🔍 Buscar por palavra-chave...">
                        <select id="artigosPorPagina">
                            <option value="3">3 por página</option>
                            <option value="6">6 por página</option>
                            <option value="9">9 por página</option>
                        </select>
                    </div>
                </div>

                <!-- Grid de artigos -->
                <div class="artigos-grid" id="todosArtigos"></div>

                <!-- Paginação -->
                <div class="paginacao" id="paginacao"></div>
            </div>
        </section>
    </main>

    <!-- Rodapé -->
    <footer>
        <div class="footer-content">
            <div class="footer-section">
                <h3>Links Rápidos</h3>
                <ul class="footer-links">
                    <li><a href="index.html">Início</a></li>
                    <li><a href="artigos.html">Artigos</a></li>
                    <li><a href="voluntario.html">Voluntário</a></li>
                </ul>
            </div>
            <div class="footer-section">
                <h3>Contato</h3>
                <p>contato@blogsocial.com</p>
                <p>+55 (11) 1234-5678</p>
                <div class="footer-redes-sociais">
                    <a href="#" class="footer-rede-link" title="Facebook" aria-label="Facebook">

                    </a>
                    <a href="#" class="footer-rede-link" title="Instagram" aria-label="Instagram">
                        <svg viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><circle cx="12" cy="12" r="5"/><circle cx="17.5" cy="6.5" r="1.5"/></svg>
                    </a>
                    <a href="#" class="footer-rede-link" title="Twitter" aria-label="Twitter">
                        <svg viewBox="0 0 24 24"><path d="M23 3a10.9 10.9 0 0 1-3.14 1.53 4.48 4.48 0 0 0-7.86 3v1A10.66 10.66 0 0 1 3 4s-4 9 5 13a11.64 11.64 0 0 1-7 2c9 5 20 0 20-11.5a4.5 4.5 0 0 0-.08-.83A7.72 7.72 0 0 0 23 3z"/></svg>
                    </a>
                    <a href="#" class="footer-rede-link" title="YouTube" aria-label="YouTube">
                        <svg viewBox="0 0 24 24"><path d="M22.54 6.42a2.78 2.78 0 0 0-1.94-2C18.88 4 12 4 12 4s-6.88 0-8.6.46a2.78 2.78 0 0 0-1.94 2A29.94 29.94 0 0 0 1 12a29.94 29.94 0 0 0 .46 5.58 2.78 2.78 0 0 0 1.94 2C5.12 20 12 20 12 20s6.88 0 8.6-.46a2.78 2.78 0 0 0 1.94-2A29.94 29.94 0 0 0 23 12a29.94 29.94 0 0 0-.46-5.58z"/><polygon points="9.75 15.02 15.5 12 9.75 8.98 9.75 15.02"/></svg>

                        <svg viewBox="0 0 24 24"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6zM2 9h4v12H2zM4 6a2 2 0 1 0 0-4 2 2 0 0 0 0 4z"/></svg>

    <!-- Scripts -->
    <script src="js/database.js"></script>
    <script src="js/main.js"></script>
    <script>
        /**
         * Gerenciador da listagem de artigos com filtros e paginação
         */
        var ArtigosManager = function() {
            this.artigosPorPagina = 3;
            this.paginaAtual = 1;
            this.artigosFiltrados = [];
            this.init();
        };

        ArtigosManager.prototype.init = function() {
            this.carregarArtigos();
            this.configurarFiltros();
            this.renderizarArtigos();
            console.log('📰 ArtigosManager inicializado');
            artigosDB.mostrarEstado();
        };

        // Carrega os artigos do banco de dados
        ArtigosManager.prototype.carregarArtigos = function() {
            artigosDB.carregarDados();
            this.artigosFiltrados = [].concat(artigosDB.getTodosArtigos());
            console.log('📚 Artigos carregados:', this.artigosFiltrados.length);
        };

        // Configura os filtros de busca e quantidade por página
        ArtigosManager.prototype.configurarFiltros = function() {
            var self = this;
            var buscaInput = document.getElementById('buscaArtigos');
            var selectPagina = document.getElementById('artigosPorPagina');

            if (buscaInput) {
                buscaInput.addEventListener('input', function() {
                    var termo = this.value.toLowerCase();
                    self.carregarArtigos();

                    if (termo) {
                        self.artigosFiltrados = self.artigosFiltrados.filter(function(artigo) {
                            return artigo.titulo.toLowerCase().indexOf(termo) !== -1 ||
                                artigo.palavrasChave.some(function(keyword) {
                                    return keyword.toLowerCase().indexOf(termo) !== -1;
                                });
                        });
                    }

                    self.paginaAtual = 1;
                    self.renderizarArtigos();
                });
            }

            if (selectPagina) {
                selectPagina.addEventListener('change', function() {
                    self.artigosPorPagina = parseInt(this.value);
                    self.paginaAtual = 1;
                    self.renderizarArtigos();
                });
            }
        };

        // Renderiza os cards de artigo na página atual
        ArtigosManager.prototype.renderizarArtigos = function() {
            var container = document.getElementById('todosArtigos');
            if (!container) return;

            var inicio = (this.paginaAtual - 1) * this.artigosPorPagina;
            var fim = inicio + this.artigosPorPagina;
            var artigosPagina = this.artigosFiltrados.slice(inicio, fim);

            if (artigosPagina.length === 0) {
                container.innerHTML = '<p style="text-align:center;padding:2rem;">Nenhum artigo encontrado.</p>';
                document.getElementById('paginacao').innerHTML = '';
                return;
            }

            container.innerHTML = artigosPagina.map(function(artigo) {
                return '<article class="artigo-card" onclick="window.location.href=\'artigo.html?id=' + artigo.id + '\'">' +
                    '<div class="artigo-imagem">' +
                        '<img src="' + artigo.imagem + '" alt="' + artigo.titulo + '" loading="lazy" onerror="this.src=\'https://via.placeholder.com/400x200?text=Sem+imagem\'">' +
                    '</div>' +
                    '<div class="artigo-info">' +
                        '<h3>' + artigo.titulo + '</h3>' +
                        '<div class="palavras-chave">' +
                            artigo.palavrasChave.map(function(k) { return '<span class="keyword-tag">' + k + '</span>'; }).join('') +
                        '</div>' +
                        '<div class="artigo-meta">' +
                            '<span>' + new Date(artigo.dataPublicacao + 'T12:00:00').toLocaleDateString('pt-BR') + '</span>' +
                            '<span>' + artigo.autor + '</span>' +
                        '</div>' +
                    '</div>' +
                '</article>';
            }).join('');

            this.renderizarPaginacao();
        };

        // Renderiza os botões de paginação
        ArtigosManager.prototype.renderizarPaginacao = function() {
            var container = document.getElementById('paginacao');
            var totalPaginas = Math.ceil(this.artigosFiltrados.length / this.artigosPorPagina);

            if (totalPaginas <= 1) {
                container.innerHTML = '';
                return;
            }

            var html = '<div class="paginacao-botoes">';

            // Botão anterior
            html += '<button class="pagina-btn" onclick="artigosManager.irParaPagina(' + (this.paginaAtual - 1) + ')" ' +
                (this.paginaAtual === 1 ? 'disabled' : '') + '>←</button>';

            // Números das páginas
            for (var i = 1; i <= totalPaginas; i++) {
                html += '<button class="pagina-btn ' + (i === this.paginaAtual ? 'active' : '') + '" ' +
                    'onclick="artigosManager.irParaPagina(' + i + ')">' + i + '</button>';
            }

            // Botão próximo
            html += '<button class="pagina-btn" onclick="artigosManager.irParaPagina(' + (this.paginaAtual + 1) + ')" ' +
                (this.paginaAtual === totalPaginas ? 'disabled' : '') + '>→</button>';

            html += '</div>';
            container.innerHTML = html;
        };

        // Navega para uma página específica
        ArtigosManager.prototype.irParaPagina = function(pagina) {
            var totalPaginas = Math.ceil(this.artigosFiltrados.length / this.artigosPorPagina);
            if (pagina < 1 || pagina > totalPaginas) return;

            this.paginaAtual = pagina;
            this.renderizarArtigos();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        // Inicialização
        var artigosManager;
        document.addEventListener('DOMContentLoaded', function() {
            console.log('🔄 Inicializando página de artigos...');
            artigosManager = new ArtigosManager();
        });
    </script>
</body>
</html>
